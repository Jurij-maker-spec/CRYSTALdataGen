structure: Al2O3_PBE
results_group_dir: Al2O3_PBE

dry_run: false
smoke_test: false
max_runs: null
max_parallel_trainings: 1

crystal_db_path: data/ref_db.h5

eval_settings:
  device: cuda
  default_dtype: float64
  frechet: true
  fmax: 1.0e-11
  compare_crystal_modes: true
  crystal_hess_path: null
  crystal_freq_out_path: null
  crystal_hessian_units: hartree/bohr^2
  write_ref_db: true
  ref_db_path: data/ref_db.h5
  use_ref_db_cache: true
  force_reeval: false
  plot_only: false

base_config:
  train_file: train_Al2O3_PBE_539.xyz
  valid_file: valid_Al2O3_PBE_60.xyz
  chem: Al2O3
  atomic_numbers: [8, 13]
  model_type: MACELES
  E0s: average
  batch_size: 2
  valid_batch_size: 2
  max_epochs: 173

sweep_grid:
  seed: [2]
  r_max: [2.5, 3.0, 3.5, ]
  batch_size: [1]
  valid_batch_size: [1]
  energy_weight: [2.0]
  forces_weight: [100.0]
  les_arguments:
    - configs/les_cfg/les_dl0p75.yaml
    - configs/les_cfg/les_dl1p0.yaml
    - configs/les_cfg/les_dl1p5.yaml
    - configs/les_cfg/les_dl2p0.yaml
    - configs/les_cfg/les_dl2p5.yaml
  use_stress: [false]
  stress_weight: [2.0] 

  
