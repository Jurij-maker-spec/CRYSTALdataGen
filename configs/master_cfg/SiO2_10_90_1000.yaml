structure: SiO2
results_group_dir: SiO2_1000_10_90

dry_run: false
smoke_test: false
max_runs: null
max_parallel_trainings: 1

crystal_db_path: data/ref_db.h5

eval_settings:
  device: cuda
  default_dtype: float64
  frechet: true
  fmax: 1.0e-11
  compare_crystal_modes: true
  crystal_hess_path: null
  crystal_freq_out_path: null
  crystal_hessian_units: hartree/bohr^2
  write_ref_db: true
  ref_db_path: data/ref_db.h5
  use_ref_db_cache: true
  force_reeval: false
  plot_only: false

base_config:
  train_file: train_SiO2_890.xyz
  valid_file: valid_SiO2_99.xyz
  chem: SiO2
  atomic_numbers: [8, 14]
  model_type: MACELES
  E0s: average
  batch_size: 2
  valid_batch_size: 2
  max_epochs: 173

sweep_grid:
  seed: [1, 2, 3]
  r_max: [3.0, 3.25, 4.0, 4.25]
  batch_size: [2]
  valid_batch_size: [2]
  energy_weight: [1.0]
  forces_weight: [50, 75, 100.0]
  use_stress: [false]
  stress_weight: [2.0] 
