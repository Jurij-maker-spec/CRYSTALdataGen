structure: TiO2_rutil_PBE
results_group_dir: TiO2_rutil_PBE_25_75

dry_run: false
smoke_test: false
max_runs: null
max_parallel_trainings: 1

crystal_db_path: data/ref_db.h5

eval_settings:
  device: cuda
  default_dtype: float64
  frechet: true
  fmax: 1.0e-11
  compare_crystal_modes: true
  crystal_hess_path: null
  crystal_freq_out_path: null
  crystal_hessian_units: hartree/bohr^2
  write_ref_db: true
  ref_db_path: data/ref_db.h5
  use_ref_db_cache: true
  force_reeval: false
  plot_only: false

base_config:
  chem: TiO2
  atomic_numbers: [8, 22]
  model_type: MACELES
  E0s: average
  batch_size: 2
  valid_batch_size: 2
  max_epochs: 173

sweep_grid:
  seed: [1, 2, 3]
  r_max: [6.75, 7.0, 7.25]
  batch_size: [2]
  valid_batch_size: [2]
  energy_weight: [1.0, 2.0, 3.0]
  forces_weight: [50, 75.0, 100.0]
  use_stress: [false]
  stress_weight: [2.0] 

dataset_file_sweep:
  enabled: true
  datasets:
    n548:
      dataset_size: 548
      train_file: TiO2_rutil_PBE/train_SiO2_PBE_n548.xyz
      valid_file: TiO2_rutil_PBE/valid_SiO2_PBE_n548.xyz

  
